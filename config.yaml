github:
  repo_owner: "danluu"
  repo_name: "post-mortems"
  branch: "master"
  api_base_url: "https://api.github.com"
  raw_base_url: "https://raw.githubusercontent.com"

crawling:
  request_timeout_seconds: 30
  max_retries: 3
  retry_backoff_seconds: 2

parsing:
  # The danluu repo is a single README.md — this is the file we target
  target_file: "README.md"
  # Minimum number of characters in a parsed description to be considered valid
  min_description_length: 1

normalisation:
  # Fields considered required for a record to pass quality threshold
  required_fields:
    - "title"
    - "source_url"
    - "description"
  # Simhash similarity threshold for near-duplicate detection (0-1, lower = stricter)
  dedup_similarity_threshold: 0.9

quality:
  # Records below this score are stored but flagged as low quality
  minimum_score_threshold: 0.3

enrichment:
  # Set to false to skip the LLM enrichment stage entirely
  enabled: false
  # LangChain model identifier — swap this to change provider/model without code changes
  model: "claude-sonnet-4-6"
  # API key is read from the ANTHROPIC_API_KEY environment variable
  # Seconds to wait for a response before giving up on a single record
  request_timeout_seconds: 30
  # Maximum characters of fetched page content to send to the LLM
  # Keeps token costs predictable; most post-mortems fit well within 50k chars
  max_content_chars: 50000
  # Skip enrichment for records below this parse confidence — avoids wasting
  # API calls on low-signal records where the source URL is unreliable
  min_parse_confidence: 0.3

storage:
  output_directory: "./output/incidents"
  # Index file tracks all stored records for fast lookup without reading all files
  index_file: "./output/index.json"
  # Run state file tracks crawl progress to support resumption
  run_state_file: "./output/run_state.json"
  # Whether to overwrite existing records or skip them on re-run
  overwrite_existing: false

taxonomy:
  infrastructure:
    - network: 
      - latency 
      - partition
      - dns_failure
    - compute:
      - cpu_saturation
      - host_failure
      - noisy_neighbour
    - storage:
      - disk_failure
      - iops_aturation
      - replication_lag
  application:
    - memory: 
      - leak 
      - oom
      - gc_pressure
    - concurrency:
      - deadlock
      - race_condition
      - thread_starvation
    - dependency:
      - cascade fail
      - timeout
      - circuit_break
  operational:
    - misconfiguration: 
      - baddeploy
      - config_drift
      - secret_rotation
    - capacity:
      - quota exhaustion
      - traffic_surge
      - storage_full
    - process:
      - zombie_process
      - runaway_job
